<!DOCTYPE html>

<html>

<head>

<title>Cohort 4 Office Locations</title>

<style>

html,
body{

    margin:0;

    height:100%;

    font-family:Arial,sans-serif;

}


/* =============================
   MAP
============================= */

#map{

    width:100%;

    height:100vh;

}



/* =============================
   SIDEBAR
============================= */

#sidebar{

    position:absolute;

    left:20px;

    top:50%;

    transform:translateY(-50%);

    width:320px;

    max-height:82vh;

    padding:20px;

    box-sizing:border-box;

    overflow-y:auto;

    background:rgba(255,255,255,.97);

    border-radius:18px;

    box-shadow:0 8px 30px rgba(0,0,0,.18);

    backdrop-filter:blur(5px);

    z-index:1000;

    scroll-behavior:smooth;

}


/* Scrollbar */

#sidebar::-webkit-scrollbar{

    width:6px;

}

#sidebar::-webkit-scrollbar-thumb{

    background:#c8c8c8;

    border-radius:10px;

}



/* =============================
   HEADINGS
============================= */

#sidebar h2{

    margin-top:0;

    margin-bottom:18px;

    color:#1f1f1f;

}

#sidebar h3{

    margin:0;

}



/* =============================
   FILTER + SEARCH
============================= */

#countryFilter,
#searchBox{

    width:100%;

    padding:10px;

    box-sizing:border-box;

    border:1px solid #ddd;

    border-radius:8px;

    font-size:14px;

    margin-bottom:12px;

    background:#fff;

}

#countryFilter{

    cursor:pointer;

}

#countryFilter:focus,
#searchBox:focus{

    outline:none;

    border-color:#4285f4;

    box-shadow:0 0 0 2px rgba(66,133,244,.15);

}



/* =============================
   COUNTRY GROUPS
============================= */

.countryGroup{

    margin-bottom:12px;

}

.countryGroup summary{

    display:flex;

    align-items:center;

    cursor:pointer;

    padding:10px;

    border-radius:8px;

    background:#f5f7fa;

    transition:.2s;

    font-weight:bold;

}

.countryGroup summary:hover{

    background:#e8f0fe;

}



/* Colour circle */

.countryDot{

    width:12px;

    height:12px;

    border-radius:50%;

    display:inline-block;

    margin-right:10px;

    flex-shrink:0;

}



/* Office list */

.countryGroup ul{

    margin:8px 0 0 20px;

    padding:0;

}

.countryGroup li{

    list-style:none;

}



/* =============================
   OFFICE ITEMS
============================= */

.officeItem{

    padding:8px 10px;

    cursor:pointer;

    border-radius:8px;

    transition:.2s;

    font-size:14px;

}

.officeItem:hover{

    background:#e8f0fe;

    transform:translateX(4px);

}



/* =============================
   TOTAL OFFICE COUNT
============================= */

#totalOffices{

    color:#0b57d0;

    font-weight:bold;

}



/* =============================
   EXPORT BUTTON
============================= */

#exportCSV{

    width:100%;

    padding:10px;

    border:none;

    border-radius:8px;

    background:#0b57d0;

    color:#fff;

    font-size:14px;

    font-weight:bold;

    cursor:pointer;

    transition:.2s;

}

#exportCSV:hover{

    background:#0846a8;

}



/* =============================
   DIVIDER
============================= */

hr{

    border:none;

    border-top:1px solid #ececec;

    margin:16px 0;

}



/* =============================
   MOBILE
============================= */

@media(max-width:768px){

#sidebar{

    width:92%;

    left:50%;

    top:15px;

    transform:translateX(-50%);

    max-height:48vh;

    border-radius:16px;

}

}

@media(max-width:480px){

#sidebar{

    padding:15px;

}

#sidebar h2{

    font-size:20px;

}

.officeItem{

    font-size:13px;

}

}

</style>
</head>

<body>

<div id="sidebar">

    <h2>Office Summary</h2>

    <!-- Country Filter -->
    <select id="countryFilter">

        <option value="All">
            All Countries
        </option>

    </select>


    <!-- Office Search -->
    <input
        type="text"
        id="searchBox"
        placeholder="Search office..."
    >


    <hr>


    <!-- Export -->
    <button id="exportCSV">
        Export Office List (CSV)
    </button>


    <hr>


    <!-- Country / Office Summary -->
    <div id="countrySummary"></div>


    <hr>


    <!-- Total Offices -->
    <div>

        <strong>Total Offices:</strong>

        <span id="totalOffices">0</span>

    </div>

</div>


<!-- Google Map -->
<div id="map"></div>

<script>

let map;
let officeLayer;

let offices = [];

let currentCountry = "All";

let currentFilteredOffices = [];

const countryColors = {};

let clickInfo;


// =============================
// GENERATE COUNTRY COLOUR
// =============================

function generateColor() {

    return "#" +
        Math.floor(Math.random() * 16777215)
        .toString(16)
        .padStart(6, "0");

}


function getCountryColor(country) {

    if (!countryColors[country]) {

        countryColors[country] =
            generateColor();

    }

    return countryColors[country];

}



// =============================
// CREATE MARKER ICON
// =============================

function createMarkerIcon(color) {

    return {

        path: google.maps.SymbolPath.CIRCLE,

        fillColor: color,

        fillOpacity: 1,

        strokeColor: "#ffffff",

        strokeWeight: 2,

        scale: 8

    };

}



// =============================
// INITIALIZE MAP
// =============================

async function initMap() {


    map = new google.maps.Map(

        document.getElementById("map"),

        {

            center: {
                lat: 8,
                lng: -11
            },

            zoom: 5

        }

    );



    clickInfo =
        new google.maps.InfoWindow();




    // =============================
    // LOAD OFFICE DATA
    // =============================

    const response =
        await fetch(
        "API_URL_FROM_DB"
        );


    offices =
        await response.json();



    console.log(offices);




    // =============================
    // COUNTRY DROPDOWN
    // =============================

    const countries = {};


    offices.forEach(function(office){


        const country =
            office.country_name;


        if(!countries[country]){

            countries[country] = [];

        }


        countries[country].push(office);


    });



    const filter =
        document.getElementById("countryFilter");



    filter.innerHTML =
        '<option value="All">All Countries</option>';



    Object.keys(countries)

    .sort()

    .forEach(function(country){


        const option =
            document.createElement("option");


        option.value =
            country;


        option.textContent =
            country;


        filter.appendChild(option);


    });




    // =============================
    // COUNTRY CHANGE
    // =============================

    filter.addEventListener(
        "change",
        function(){


            currentCountry =
                this.value;


            updateView();


        }
    );




    // =============================
    // OFFICE SEARCH
    // =============================

    document
    .getElementById("searchBox")
    .addEventListener(
        "input",
        function(){

            updateView();

        }
    );





    // =============================
    // CREATE MAP LAYER
    // =============================

    officeLayer =
        new google.maps.Data();


    officeLayer.setMap(map);





    // =============================
    // MARKER CLICK EVENT
    // =============================

    officeLayer.addListener(
        "click",
        function(event){


            clickInfo.setContent(

            `

            <div>

                <h3>
                ${event.feature.getProperty("name")}
                </h3>


                <b>Country:</b>
                ${event.feature.getProperty("country")}
                <br>


                <b>Project:</b>
                ${event.feature.getProperty("project")}
                <br>


                <b>Cohort:</b>
                ${event.feature.getProperty("cohort")}


            </div>

            `

            );



            clickInfo.setPosition(
                event.latLng
            );


            clickInfo.open(
                map
            );


        }
    );




    // =============================
    // FIRST LOAD
    // =============================

    updateView();


}


// =============================
// UPDATE EVERYTHING
// =============================

function updateView(){


    const searchText =
        document
        .getElementById("searchBox")
        .value
        .toLowerCase();



    currentFilteredOffices =

        offices.filter(function(office){


            const countryMatch =

                currentCountry === "All"

                ||

                office.country_name === currentCountry;



            const searchMatch =

                office.branch_office_name
                .toLowerCase()
                .includes(searchText);



            return countryMatch && searchMatch;


        });




    // Update sidebar

    renderCountrySummary(
        currentFilteredOffices
    );



    // Update total

    document
    .getElementById("totalOffices")
    .textContent =
        currentFilteredOffices.length;



    // Update map

    renderMap(
        currentFilteredOffices
    );



}





// =============================
// RENDER COUNTRY SUMMARY
// =============================

function renderCountrySummary(filteredOffices){


    const summary =
        document.getElementById(
            "countrySummary"
        );


    summary.innerHTML = "";



    const countries = {};



    filteredOffices.forEach(function(office){


        const country =
            office.country_name;



        if(!countries[country]){

            countries[country] = [];

        }


        countries[country].push(office);


    });




    Object.keys(countries)

    .sort()

    .forEach(function(country){



        const details =
            document.createElement(
                "details"
            );


        details.className =
            "countryGroup";



        const summaryTag =
            document.createElement(
                "summary"
            );



        const colour =
            document.createElement(
                "span"
            );


        colour.style.width =
            "12px";


        colour.style.height =
            "12px";


        colour.style.display =
            "inline-block";


        colour.style.borderRadius =
            "50%";


        colour.style.marginRight =
            "8px";


        colour.style.background =
            getCountryColor(country);




        summaryTag.appendChild(
            colour
        );



        summaryTag.innerHTML +=

            `<strong>${country}</strong>
             (${countries[country].length})`;



        details.appendChild(
            summaryTag
        );




        const ul =
            document.createElement(
                "ul"
            );



        countries[country]

        .sort(function(a,b){

            return a.branch_office_name
            .localeCompare(
                b.branch_office_name
            );

        })

        .forEach(function(office){



            const li =
                document.createElement(
                    "li"
                );



            li.className =
                "officeItem";



            li.textContent =
                office.branch_office_name;




            li.onclick=function(){



                const position = {

                    lat:
                    Number(
                        office.gps_lat
                    ),


                    lng:
                    Number(
                        office.gps_long
                    )

                };



                map.panTo(position);


                map.setZoom(13);



                clickInfo.setContent(

                `

                <div>

                <h3>
                ${office.branch_office_name}
                </h3>


                <b>Country:</b>
                ${office.country_name}
                <br>


                <b>Project:</b>
                ${office.project_name}
                <br>


                <b>Cohort:</b>
                ${office.fiscal_year}


                </div>

                `

                );


                clickInfo.setPosition(
                    position
                );


                clickInfo.open(
                    map
                );



            };



            ul.appendChild(
                li
            );


        });



        details.appendChild(
            ul
        );



        summary.appendChild(
            details
        );



    });



}







// =============================
// DRAW MAP MARKERS
// =============================

function renderMap(filteredOffices){



    officeLayer.forEach(function(feature){

        officeLayer.remove(feature);

    });




    const geoJson = {


        type:"FeatureCollection",


        features:

        filteredOffices.map(function(office){


            return {


                type:"Feature",


                geometry:{


                    type:"Point",


                    coordinates:[

                        Number(
                            office.gps_long
                        ),

                        Number(
                            office.gps_lat
                        )

                    ]

                },


                properties:{


                    name:
                    office.branch_office_name,


                    country:
                    office.country_name,


                    project:
                    office.project_name,


                    cohort:
                    office.fiscal_year


                }


            };


        })


    };





    officeLayer.addGeoJson(
        geoJson
    );





    officeLayer.setStyle(function(feature){



        const country =
            feature.getProperty(
                "country"
            );



        return {


            icon:
            createMarkerIcon(
                getCountryColor(country)
            ),


            title:
            feature.getProperty(
                "name"
            )


        };


    });





    // Zoom to results

    if(filteredOffices.length){


        const bounds =
            new google.maps.LatLngBounds();



        filteredOffices.forEach(function(office){


            bounds.extend({

                lat:
                Number(
                    office.gps_lat
                ),


                lng:
                Number(
                    office.gps_long
                )

            });


        });


        map.fitBounds(
            bounds
        );


    }



}







// =============================
// EXPORT CSV
// =============================

document
.getElementById("exportCSV")
.onclick=function(){


    let csv =
    "Office,Country,Project,Cohort\n";



    currentFilteredOffices
    .forEach(function(o){



        csv +=

        `"${o.branch_office_name}",` +

        `"${o.country_name}",` +

        `"${o.project_name}",` +

        `"${o.fiscal_year}"\n`;



    });



    const blob =
        new Blob(

            [csv],

            {
                type:"text/csv"
            }

        );



    const link =
        document.createElement(
            "a"
        );



    link.href =
        URL.createObjectURL(
            blob
        );



    link.download =
        "office_locations.csv";



    link.click();


};

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDAkSlHWqGO0WH8HFgkN_xxxxxxxxxx&callback=initMap">
</script>

</body>

</html>
